<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — Edit Your Profile</title>
<style>
  :root {
    --bg: #0f0f0f;
    --card-bg: #1a1a1a;
    --text: #f5f5f5;
    --text-secondary: #a0a0a0;
    --border: rgba(255,255,255,0.08);
    --primary: #4a7cff;
    --danger: #ff5c5c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 64px;
  }
  .container { max-width: 480px; margin: 0 auto; }
  h1 { font-size: 20px; margin-bottom: 20px; }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
  }
  label { display: block; font-size: 13px; color: var(--text-secondary); margin: 14px 0 6px; }
  label:first-child { margin-top: 0; }
  input, textarea, select {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
  }
  textarea { resize: vertical; min-height: 70px; }
  button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 16px;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-secondary { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); font-weight: 400; }
  .link-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .link-row select { flex: 0 0 110px; }
  .link-row input { flex: 1; }
  .link-row .remove-link { flex: 0 0 32px; background: transparent; color: var(--danger); border: none; font-size: 18px; cursor: pointer; padding: 0; margin: 0; }
  .add-link-btn { background: transparent; border: 1px dashed var(--border); color: var(--text-secondary); margin-top: 4px; }
  .status { font-size: 13px; padding: 8px 0; text-align: center; min-height: 20px; }
  .status.success { color: #5cff8f; }
  .status.error { color: var(--danger); }
  .hidden { display: none !important; }
  .color-row { display: flex; gap: 8px; margin-top: 6px; }
  .color-swatch {
    width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent;
  }
  .color-swatch.selected { border-color: #fff; }
  .qr-box { text-align: center; }
  .qr-box img { max-width: 200px; margin: 12px 0; background: #fff; padding: 12px; border-radius: 8px; }
  .profile-url { font-size: 12px; color: var(--text-secondary); word-break: break-all; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 6px; margin-top: 8px; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .top-bar button { width: auto; padding: 8px 14px; margin: 0; font-size: 13px; }
</style>
</head>
<body>
<div class="container">

  <!-- AUTH SECTION -->
  <div id="authSection">
    <h1>Sign in to edit your profile</h1>
    <div class="card">
      <label>Email</label>
      <input type="email" id="authEmail" autocomplete="email">
      <label>Password</label>
      <input type="password" id="authPassword" autocomplete="current-password">
      <button class="btn-primary" id="loginBtn">Log in</button>
      <button class="btn-secondary" id="signupBtn">Create new account</button>
      <div class="status" id="authStatus"></div>
    </div>
  </div>

  <!-- EDITOR SECTION -->
  <div id="editorSection" class="hidden">
    <div class="top-bar">
      <h1 style="margin:0">Edit your profile</h1>
      <button class="btn-secondary" id="logoutBtn">Log out</button>
    </div>

    <div class="card">
      <label>Name</label>
      <input type="text" id="fName" placeholder="Talal">
      <label>Title / Role</label>
      <input type="text" id="fTitle" placeholder="Founder, Talal Labs">
      <label>Bio</label>
      <textarea id="fBio" placeholder="A short line about what you do"></textarea>
      <label>Photo URL</label>
      <input type="text" id="fPhoto" placeholder="https://...">
      <label>Accent color</label>
      <div class="color-row" id="colorRow"></div>
    </div>

    <div class="card">
      <label style="margin-top:0">Links</label>
      <div id="linksContainer"></div>
      <button class="add-link-btn" id="addLinkBtn">+ Add link</button>
    </div>

    <button class="btn-primary" id="saveBtn">Save changes</button>
    <div class="status" id="saveStatus"></div>

    <div class="card qr-box">
      <label style="margin-top:0">Your profile link</label>
      <div class="profile-url" id="profileUrlDisplay"></div>
      <img id="qrImage" src="" alt="QR code">
      <button class="btn-secondary" id="copyLinkBtn">Copy link</button>
    </div>
  </div>

</div>

<script type="module">
  import { auth, db } from "./firebase-config.js";
  import {
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const LINK_TYPES = ["linkedin", "whatsapp", "instagram", "website", "youtube", "facebook", "twitter", "tiktok"];
  const COLORS = ["#4a7cff", "#ff5c5c", "#5cff8f", "#ffb84a", "#b85cff", "#4a4a4a"];

  const authSection = document.getElementById("authSection");
  const editorSection = document.getElementById("editorSection");
  const authStatus = document.getElementById("authStatus");
  const saveStatus = document.getElementById("saveStatus");
  const linksContainer = document.getElementById("linksContainer");
  const colorRow = document.getElementById("colorRow");

  let currentUser = null;
  let selectedColor = COLORS[0];

  // --- Auth ---
  document.getElementById("loginBtn").addEventListener("click", async () => {
    const email = document.getElementById("authEmail").value.trim();
    const pw = document.getElementById("authPassword").value;
    authStatus.textContent = "";
    try {
      await signInWithEmailAndPassword(auth, email, pw);
    } catch (err) {
      authStatus.className = "status error";
      authStatus.textContent = friendlyAuthError(err);
    }
  });

  document.getElementById("signupBtn").addEventListener("click", async () => {
    const email = document.getElementById("authEmail").value.trim();
    const pw = document.getElementById("authPassword").value;
    authStatus.textContent = "";
    if (pw.length < 6) {
      authStatus.className = "status error";
      authStatus.textContent = "Password must be at least 6 characters.";
      return;
    }
    try {
      await createUserWithEmailAndPassword(auth, email, pw);
    } catch (err) {
      authStatus.className = "status error";
      authStatus.textContent = friendlyAuthError(err);
    }
  });

  document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth));

  function friendlyAuthError(err) {
    const code = err.code || "";
    if (code.includes("email-already-in-use")) return "That email is already registered — try logging in instead.";
    if (code.includes("invalid-credential") || code.includes("wrong-password") || code.includes("user-not-found")) return "Incorrect email or password.";
    if (code.includes("weak-password")) return "Password is too weak.";
    if (code.includes("invalid-email")) return "That email address looks invalid.";
    return "Something went wrong. Please try again.";
  }

  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    if (user) {
      authSection.classList.add("hidden");
      editorSection.classList.remove("hidden");
      await loadProfileIntoForm(user.uid);
    } else {
      authSection.classList.remove("hidden");
      editorSection.classList.add("hidden");
    }
  });

  // --- Color swatches ---
  COLORS.forEach(c => {
    const sw = document.createElement("div");
    sw.className = "color-swatch";
    sw.style.background = c;
    sw.addEventListener("click", () => {
      selectedColor = c;
      document.querySelectorAll(".color-swatch").forEach(s => s.classList.remove("selected"));
      sw.classList.add("selected");
    });
    colorRow.appendChild(sw);
  });

  // --- Links management ---
  function addLinkRow(type = "linkedin", url = "") {
    const row = document.createElement("div");
    row.className = "link-row";
    const select = document.createElement("select");
    LINK_TYPES.forEach(t => {
      const opt = document.createElement("option");
      opt.value = t;
      opt.textContent = t[0].toUpperCase() + t.slice(1);
      if (t === type) opt.selected = true;
      select.appendChild(opt);
    });
    const input = document.createElement("input");
    input.type = "text";
    input.placeholder = "URL or number";
    input.value = url;
    const removeBtn = document.createElement("button");
    removeBtn.className = "remove-link";
    removeBtn.textContent = "×";
    removeBtn.addEventListener("click", () => row.remove());

    row.appendChild(select);
    row.appendChild(input);
    row.appendChild(removeBtn);
    linksContainer.appendChild(row);
  }

  document.getElementById("addLinkBtn").addEventListener("click", () => addLinkRow());

  function getLinksFromForm() {
    return Array.from(linksContainer.querySelectorAll(".link-row")).map(row => ({
      type: row.querySelector("select").value,
      url: row.querySelector("input").value.trim()
    })).filter(l => l.url);
  }

  // --- Load / Save ---
  async function loadProfileIntoForm(uid) {
    const snap = await getDoc(doc(db, "profiles", uid));
    linksContainer.innerHTML = "";

    if (snap.exists()) {
      const p = snap.data();
      document.getElementById("fName").value = p.name || "";
      document.getElementById("fTitle").value = p.title || "";
      document.getElementById("fBio").value = p.bio || "";
      document.getElementById("fPhoto").value = p.photoUrl || "";
      selectedColor = p.accentColor || COLORS[0];
      (p.links || []).forEach(l => addLinkRow(l.type, l.url));
    } else {
      addLinkRow("linkedin");
      addLinkRow("whatsapp");
    }

    document.querySelectorAll(".color-swatch").forEach(s => {
      s.classList.toggle("selected", s.style.background === hexToRgb(selectedColor));
    });
    if (!document.querySelector(".color-swatch.selected")) {
      colorRow.children[0].classList.add("selected");
    }

    updateProfileLinkDisplay(uid);
  }

  function hexToRgb(hex) {
    const c = hex.replace("#", "");
    const r = parseInt(c.substring(0,2), 16);
    const g = parseInt(c.substring(2,4), 16);
    const b = parseInt(c.substring(4,6), 16);
    return `rgb(${r}, ${g}, ${b})`;
  }

  function updateProfileLinkDisplay(uid) {
    const url = `${window.location.origin}${window.location.pathname.replace("admin.html", "index.html")}?id=${uid}`;
    document.getElementById("profileUrlDisplay").textContent = url;
    document.getElementById("qrImage").src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(url)}`;

    document.getElementById("copyLinkBtn").onclick = () => {
      navigator.clipboard.writeText(url);
      const btn = document.getElementById("copyLinkBtn");
      const original = btn.textContent;
      btn.textContent = "Copied!";
      setTimeout(() => btn.textContent = original, 1500);
    };
  }

  document.getElementById("saveBtn").addEventListener("click", async () => {
    if (!currentUser) return;
    saveStatus.textContent = "Saving…";
    saveStatus.className = "status";

    const data = {
      name: document.getElementById("fName").value.trim(),
      title: document.getElementById("fTitle").value.trim(),
      bio: document.getElementById("fBio").value.trim(),
      photoUrl: document.getElementById("fPhoto").value.trim(),
      accentColor: selectedColor,
      links: getLinksFromForm(),
      updatedAt: new Date().toISOString()
    };

    try {
      await setDoc(doc(db, "profiles", currentUser.uid), data, { merge: true });
      saveStatus.className = "status success";
      saveStatus.textContent = "Saved. Your live profile is updated.";
    } catch (err) {
      console.error(err);
      saveStatus.className = "status error";
      saveStatus.textContent = "Couldn't save. Check your connection and try again.";
    }
  });
</script>
</body>
</html>
