<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Profile</title>

<!-- PWA manifest is injected dynamically per-user in app.js, see manifest section -->
<meta name="theme-color" content="#1a1a1a" id="theme-meta">
<link rel="apple-touch-icon" id="apple-icon" href="">

<style>
  :root {
    --accent: #4a4a4a;
    --bg: #0f0f0f;
    --card-bg: #1a1a1a;
    --text: #f5f5f5;
    --text-secondary: #a0a0a0;
    --border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 16px 48px;
  }
  .container { width: 100%; max-width: 420px; }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 24px;
    text-align: center;
  }
  .avatar {
    width: 96px; height: 96px;
    border-radius: 50%;
    object-fit: cover;
    margin: 0 auto 16px;
    background: #333;
    border: 2px solid var(--accent);
  }
  .name { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .title { font-size: 15px; color: var(--text-secondary); margin-bottom: 16px; }
  .bio { font-size: 14px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 24px; }
  .links { display: flex; flex-direction: column; gap: 10px; }
  .link-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    color: var(--text);
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    transition: background 0.15s;
  }
  .link-btn:active { background: rgba(255,255,255,0.12); }
  .install-bar {
    margin-top: 20px;
    padding: 14px;
    border-radius: 12px;
    background: var(--accent);
    color: #fff;
    font-size: 13px;
    display: none;
    cursor: pointer;
  }
  .install-bar.show { display: block; }
  .loading, .error { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
  .powered { text-align: center; margin-top: 24px; font-size: 11px; color: #555; }
</style>
</head>
<body>
<div class="container">
  <div id="content" class="loading">Loading profile…</div>
</div>

<script type="module">
  import { db } from "./firebase-config.js";
  import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const params = new URLSearchParams(window.location.search);
  const profileId = params.get("id");
  const contentEl = document.getElementById("content");

  const LINK_ICONS = {
    linkedin: "LinkedIn",
    whatsapp: "WhatsApp",
    instagram: "Instagram",
    website: "Website",
    youtube: "YouTube",
    facebook: "Facebook",
    twitter: "X / Twitter",
    tiktok: "TikTok"
  };

  function escapeHtml(str) {
    const d = document.createElement("div");
    d.textContent = str || "";
    return d.innerHTML;
  }

  async function loadProfile() {
    if (!profileId) {
      contentEl.innerHTML = `<div class="error">No profile specified.</div>`;
      return;
    }

    try {
      const snap = await getDoc(doc(db, "profiles", profileId));

      if (!snap.exists()) {
        contentEl.innerHTML = `<div class="error">This profile doesn't exist or was removed.</div>`;
        return;
      }

      const p = snap.data();

      // Apply accent color theme
      const accent = p.accentColor || "#4a4a4a";
      document.documentElement.style.setProperty("--accent", accent);
      document.getElementById("theme-meta").setAttribute("content", accent);

      // Set up PWA manifest dynamically for this profile
      const manifest = {
        name: p.name || "Profile",
        short_name: (p.name || "Profile").split(" ")[0],
        start_url: `${window.location.pathname}?id=${profileId}`,
        display: "standalone",
        background_color: "#0f0f0f",
        theme_color: accent,
        icons: p.photoUrl ? [
          { src: p.photoUrl, sizes: "192x192", type: "image/png" },
          { src: p.photoUrl, sizes: "512x512", type: "image/png" }
        ] : []
      };
      const manifestBlob = new Blob([JSON.stringify(manifest)], { type: "application/json" });
      const manifestUrl = URL.createObjectURL(manifestBlob);
      const manifestLink = document.createElement("link");
      manifestLink.rel = "manifest";
      manifestLink.href = manifestUrl;
      document.head.appendChild(manifestLink);

      if (p.photoUrl) {
        document.getElementById("apple-icon").setAttribute("href", p.photoUrl);
      }

      // Build links list
      const linksHtml = (p.links || [])
        .filter(l => l.url)
        .map(l => {
          const label = LINK_ICONS[l.type] || l.type;
          let url = l.url;
          if (l.type === "whatsapp" && !/^https?:\/\//.test(url)) {
            url = `https://wa.me/${url.replace(/\D/g, "")}`;
          } else if (!/^https?:\/\//.test(url) && l.type !== "whatsapp") {
            url = `https://${url}`;
          }
          return `<a class="link-btn" href="${escapeHtml(url)}" target="_blank" rel="noopener">${escapeHtml(label)}</a>`;
        })
        .join("");

      contentEl.className = "";
      contentEl.innerHTML = `
        <div class="card">
          <img class="avatar" src="${escapeHtml(p.photoUrl || '')}" alt="${escapeHtml(p.name || '')}" onerror="this.style.display='none'">
          <div class="name">${escapeHtml(p.name || "Unnamed")}</div>
          ${p.title ? `<div class="title">${escapeHtml(p.title)}</div>` : ""}
          ${p.bio ? `<div class="bio">${escapeHtml(p.bio)}</div>` : ""}
          <div class="links">${linksHtml}</div>
          <div class="install-bar" id="installBar">Tap to add this profile to your home screen</div>
        </div>
        <div class="powered">Powered by Talal Labs</div>
      `;

      setupInstallPrompt();

    } catch (err) {
      console.error(err);
      contentEl.innerHTML = `<div class="error">Couldn't load this profile. Check your connection and try again.</div>`;
    }
  }

  function setupInstallPrompt() {
    let deferredPrompt = null;
    const installBar = document.getElementById("installBar");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBar.classList.add("show");
    });

    installBar.addEventListener("click", async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        installBar.classList.remove("show");
      }
    });

    // iOS has no auto-prompt — detect and show manual instructions instead
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
    if (isIOS && !isStandalone) {
      installBar.textContent = "Tap the Share icon, then 'Add to Home Screen'";
      installBar.classList.add("show");
      installBar.style.cursor = "default";
    }
  }

  loadProfile();
</script>
</body>
</html>
